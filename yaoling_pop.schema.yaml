# Rime schema settings
# encoding: utf-8

__include: yaoling.schema:/

schema:
  schema_id: yaoling_pop
  name: 妖妖灵
  version: 乙巳冬至
  author:
    - 作者 朱宇浩
    - 修訂者 Evildoer
    - 官方網站 <https://shurufa.app>
    - 官方QQ群 735728797
  description: |
    妖灵輸入法之延時頂屏版,候選項唯一時不自動上屏,需要下一擊頂出候選項.
  dependencies:
    - yuhao_pinyin
    - yaoling_chaifen
    - yaoling_chaifen_tw

speller/+:
  auto_select: false  # 自動選擇唯一候選項(true)或否(false)
  alphabet: zyxwvutsrqponmlkjihgfedcba/
  initials: zyxwvutsrqponmlkjihgfedcba/
  auto_select_pattern: "[qwrtypsdfghjklxcvbnm]{0,3}[aeiou]|[qwrtypsdfghjklxcvbnm]{4}"  


translator/+:
  dictionary: yaoling_pop
  prism: yaoling_evildoer

key_binder/+:
  bindings/+:
    - { when: always, accept: "Control+Shift+N", select: yaoling_fluency } # 切換妖灵語流版
    - { when: always, accept: "Control+Shift+B", select: yaoling } # 切換妖灵標準版